version: "3.9"

# Lance uniquement Elasticsearch en local pour le développement.
# Ton PostgreSQL existant tourne déjà via ton start-backend.ps1.

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.16.0
    container_name: matching_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false      # pas d'auth en local
      - ES_JAVA_OPTS=-Xms512m -Xmx512m   # mémoire limitée pour le dev
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kibana optionnel (commenter si pas besoin)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.16.0
    container_name: matching_kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200

volumes:
  es_data:
