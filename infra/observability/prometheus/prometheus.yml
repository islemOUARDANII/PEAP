global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: "parsing-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["parsing-service:8001"]

  - job_name: "matching-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["matching-service:8002"]

  - job_name: "search-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["search-service:8003"]

  - job_name: "recommendation-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["recommendation-service:8004"]